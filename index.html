<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetSpot v2 - 최적의 약속 장소 찾기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .step-hidden { display: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-6">

    <header class="w-full max-w-md mb-8 mt-4 text-center">
        <h1 class="text-3xl font-bold text-blue-600">MeetSpot v2</h1>
        <p class="text-slate-500 mt-2 text-sm">기획안 기반 프로토타입</p>
    </header>

    <main class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8">
        
        <div id="step1" class="space-y-6 animate-fade-in">
            <h2 class="text-xl font-bold text-slate-800">어디로 가고 싶나요?</h2>
            <div class="grid grid-cols-2 gap-4" id="categoryGrid">
                <button onclick="selectCategory('FD6_1', this)" class="category-btn p-4 rounded-2xl border-2 border-slate-100 transition-all flex flex-col items-center gap-2 hover:border-blue-200">
                    <span class="text-3xl">🍱</span>
                    <span class="font-semibold text-slate-600">맛집</span>
                </button>
                <button onclick="selectCategory('CE7', this)" class="category-btn p-4 rounded-2xl border-2 border-slate-100 transition-all flex flex-col items-center gap-2 hover:border-blue-200">
                    <span class="text-3xl">☕</span>
                    <span class="font-semibold text-slate-600">카페</span>
                </button>
                <button onclick="selectCategory('FD6_2', this)" class="category-btn p-4 rounded-2xl border-2 border-slate-100 transition-all flex flex-col items-center gap-2 hover:border-blue-200">
                    <span class="text-3xl">🍺</span>
                    <span class="font-semibold text-slate-600">술집</span>
                </button>
                <button onclick="selectCategory('FD6_3', this)" class="category-btn p-4 rounded-2xl border-2 border-slate-100 transition-all flex flex-col items-center gap-2 hover:border-blue-200">
                    <span class="text-3xl">🍰</span>
                    <span class="font-semibold text-slate-600">디저트</span>
                </button>
            </div>
            <button id="btnNext1" onclick="goStep(2)" disabled class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold disabled:bg-slate-200 transition-colors mt-4">
                다음으로
            </button>
        </div>

        <div id="step2" class="step-hidden space-y-6 animate-fade-in">
            <div class="flex items-center justify-between">
                <h2 class="text-xl font-bold text-slate-800">출발지를 입력해주세요</h2>
                <span class="text-xs text-blue-600 font-medium bg-blue-50 px-2 py-1 rounded">Step 2/3</span>
            </div>
            
            <div class="bg-blue-50 p-4 rounded-xl flex items-start gap-3">
                <span class="text-blue-500 font-bold">🔒</span>
                <p class="text-[11px] text-blue-800 leading-relaxed">
                    상세 주소는 저장되지 않아요. <br/>
                    상대방에게는 <strong>가까운 역 이름</strong>으로만 공유됩니다.
                </p>
            </div>

            <div class="space-y-4">
                <input type="text" id="locationInput" oninput="checkLocation()" placeholder="역 이름이나 동네를 입력하세요" 
                    class="w-full p-4 border-2 border-slate-100 rounded-xl focus:border-blue-500 outline-none transition-all">
                <button class="w-full py-3 border-2 border-blue-600 text-blue-600 rounded-xl font-bold hover:bg-blue-50 transition-all flex justify-center items-center gap-2 text-sm">
                    📍 현재 위치 사용
                </button>
            </div>

            <button id="btnNext2" onclick="goStep(3)" disabled class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold disabled:bg-slate-200 transition-colors mt-6">
                방 만들기 & 링크 복사
            </button>
        </div>

        <div id="step3" class="step-hidden text-center space-y-6 animate-fade-in">
            <div class="py-6">
                <div class="relative inline-block">
                    <div class="w-16 h-16 bg-blue-100 rounded-full animate-ping absolute"></div>
                    <div class="w-16 h-16 bg-blue-600 rounded-full relative flex items-center justify-center text-white text-2xl">
                        🔗
                    </div>
                </div>
            </div>
            <h2 class="text-xl font-bold text-slate-800">친구를 초대하세요!</h2>
            <p class="text-sm text-slate-500">링크를 받은 친구가 위치를 입력하면<br/>자동으로 중간 지점을 계산합니다.</p>
            
            <div class="p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300 break-all text-[12px] text-slate-600 font-mono">
                meetspot.app/r/nx82kd92
            </div>

            <button onclick="alert('링크가 복사되었습니다!')" class="w-full py-4 bg-[#FEE500] text-black rounded-xl font-bold hover:bg-[#FDD835] transition-colors">
                카카오톡으로 공유하기
            </button>
            <button onclick="location.reload()" class="text-sm text-slate-400 underline">다시 만들기</button>
        </div>
    </main>

    <footer class="mt-auto py-8 text-slate-400 text-[11px]">
        © 2026 MeetSpot. All rights reserved. 개굴.
    </footer>

    <script>
        let selectedCat = null;

        function selectCategory(id, el) {
            // 모든 버튼 초기화
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('border-blue-500', 'bg-blue-50', 'text-blue-600');
                btn.classList.add('border-slate-100', 'text-slate-600');
            });
            // 선택된 버튼 강조
            el.classList.remove('border-slate-100', 'text-slate-600');
            el.classList.add('border-blue-500', 'bg-blue-50', 'text-blue-600');
            
            selectedCat = id;
            document.getElementById('btnNext1').disabled = false;
        }

        function checkLocation() {
            const val = document.getElementById('locationInput').value;
            document.getElementById('btnNext2').disabled = val.length < 2;
        }

        function goStep(num) {
            // 모든 스텝 숨기기
            document.getElementById('step1').classList.add('step-hidden');
            document.getElementById('step2').classList.add('step-hidden');
            document.getElementById('step3').classList.add('step-hidden');
            
            // 타겟 스텝 보이기
            document.getElementById('step' + num).classList.remove('step-hidden');
        }
    </script>
</body>
</html>
